<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VisionSim AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>👁 VisionSim AI</h1>

<p>See how images appear under different types of color blindness.</p>

<div class="upload" id="dropArea">

<input
type="file"
id="imageUpload"
accept="image/*">

<p>📤 Drag & Drop an image here or choose a file.</p>

</div>

<div class="controls">

<button class="active" data-filter="normal">Normal</button>

<button data-filter="protanopia">Protanopia</button>

<button data-filter="deuteranopia">Deuteranopia</button>

<button data-filter="tritanopia">Tritanopia</button>

<button data-filter="achromatopsia">Achromatopsia</button>

</div>

<div class="images">

<div class="box">

<h3>Original</h3>

<canvas id="originalCanvas"></canvas>

</div>

<div class="box">

<h3>Simulation</h3>

<canvas id="filteredCanvas"></canvas>

</div>

</div>

<div class="info">

<div class="box">

<h3>📷 Image Information</h3>

<p id="resolution">Resolution : -</p>

<p id="size">File Size : -</p>

</div>

<div class="box">

<h3>ℹ About Filter</h3>

<p id="aboutText">

Normal image.

</p>

</div>

</div>

<div class="bottom">

<button id="download">

Download Image

</button>

<button id="reset">

Reset

</button>

<button id="theme">

🌙 Dark Mode

</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
